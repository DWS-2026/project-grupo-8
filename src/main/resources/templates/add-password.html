<!DOCTYPE html>
<html lang="es">

{{> fragments/head}}

<body>

    {{> fragments/navbarPrivate}}

    <div class="container py-5">

        <div class="text-center mb-4">
            <h1 class="fw-bold">Nueva Credencial</h1>
            <p class="text-secondary">Añade una nueva contraseña a tu bóveda</p>
        </div>

        <div class="card shadow p-4 mx-auto" style="max-width: 600px;">
            <div class="card-body">

                <form id="add-password-form" method="post" action="/add-password" enctype="multipart/form-data">

                    {{#error}}
                    <div class="alert alert-danger">{{error}}</div>
                    {{/error}}

                    <div class="mb-3">
                        <label for="service" class="form-label text-white">
                            <i class="bi bi-globe me-2 text-success"></i>Servicio
                        </label>
                        <input name="service" type="text" class="form-control bg-dark text-white border-secondary" id="service"
                            placeholder="ej: Netflix, Gmail" required>
                    </div>

                    <div class="mb-3">
                        <label for="username" class="form-label text-white">
                            <i class="bi bi-person me-2 text-success"></i>Usuario / Email
                        </label>
                        <input name="username" type="text" class="form-control bg-dark text-white border-secondary" id="username"
                            placeholder="usuario@ejemplo.com" required>
                    </div>

                    <div class="mb-3">
                        <label for="url" class="form-label text-white">
                            <i class="bi bi-link-45deg me-2 text-success"></i>URL (opcional)
                        </label>
                        <input name="url" type="text" class="form-control bg-dark text-white border-secondary" id="url"
                            placeholder="https://...">
                    </div>

                    <div class="mb-3">
                        <label for="password" class="form-label text-white">
                            <i class="bi bi-key me-2 text-success"></i>Contraseña
                        </label>

                        <div class="input-group">
                            <input name="password" type="password" class="form-control bg-dark text-white border-secondary"
                                id="password" required>

                            <button class="btn btn-outline-secondary" type="button" onclick="togglePassword(this)">
                                <i class="bi bi-eye"></i>
                            </button>

                            <button class="btn btn-outline-success" type="button" onclick="generatePassword()">
                                <i class="bi bi-magic me-1"></i> Generar
                            </button>
                        </div>
                    </div>

                    <!-- Comprobar si es robusta -->
                    <div class="mb-3">
                        <div class="progress" style="height: 6px;">
                            <div id="strengthBar" class="progress-bar"></div>
                        </div>
                        <small id="strengthText" class="text-secondary"></small>
                    </div>

                    <div class="mb-3">
                        <label for="note" class="form-label text-white">Nota (opcional)</label>
                        <textarea name="note" id="note" class="form-control bg-dark text-white border-secondary" rows="3"></textarea>
                    </div>

                    <div class="mb-3">
                        <label for="credentialImage" class="form-label text-white">
                            <i class="bi bi-image me-2 text-success"></i>Imagen de la credencial (opcional)
                        </label>
                        <input name="credentialImage" type="file" class="form-control bg-dark text-white border-secondary" id="credentialImage" accept="image/*">
                    </div>

                    <div class="d-flex gap-2">
                        <a href="/passwords" class="btn btn-outline-light w-50">Cancelar</a>
                        <button type="submit" class="btn btn-primary w-50">
                            <i class="bi bi-save me-2"></i>Guardar
                        </button>
                    </div>

                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/zxcvbn@4.4.2/dist/zxcvbn.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        const passwordInput = document.getElementById('password');
        const strengthBar = document.getElementById('strengthBar');
        const strengthText = document.getElementById('strengthText');
        const submitBtn = document.querySelector('button[type="submit"]');

        const levels = [
            { text: "Muy débil", class: "bg-danger", width: "20%" },
            { text: "Débil", class: "bg-warning", width: "40%" },
            { text: "Aceptable", class: "bg-info", width: "60%" },
            { text: "Fuerte", class: "bg-primary", width: "80%" },
            { text: "Muy fuerte", class: "bg-success", width: "100%" }
        ];

        passwordInput.addEventListener('input', () => {
            const value = passwordInput.value;

            if (!value) {
                strengthBar.style.width = "0%";
                strengthBar.className = "progress-bar";
                strengthText.textContent = "";
                submitBtn.disabled = true;
                return;
            }

            const result = zxcvbn(value);
            const level = levels[result.score];

            strengthBar.style.width = level.width;
            strengthBar.className = `progress-bar ${level.class}`;
            strengthText.textContent = `Nivel: ${level.text}`;

            submitBtn.disabled = result.score < 3;
        });

        function togglePassword(btn) {
            const input = document.getElementById('password');
            const icon = btn.querySelector('i');

            if (input.type === "password") {
                input.type = "text";
                icon.classList.replace('bi-eye', 'bi-eye-slash');
            } else {
                input.type = "password";
                icon.classList.replace('bi-eye-slash', 'bi-eye');
            }
        }

        function generatePassword() {
            const chars = 'abcdefghijkmnopqrstuvwxyzABCDEFGHJKLMNPQRSTUVWXYZ23456789!@#$%&*()_-+=<>?';
            const length = 16;
            let pass = '';
            for (let i = 0; i < length; i++) {
                pass += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            const input = document.getElementById('password');
            input.value = pass;
            input.dispatchEvent(new Event('input'));
        }
    </script>

    {{> fragments/footerPrivate}}

</body>

</html>
