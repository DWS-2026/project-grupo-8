<!DOCTYPE html>
<html lang="es">

{{> fragments/head}}

<body>

    {{> fragments/navbarPrivate}}

    <div class="container py-5">

        <div class="text-center mb-4">
            <h1 class="fw-bold">Editar Credencial</h1>
            <p class="text-secondary">Edita la entrada de tu bóveda</p>
        </div>

        <div class="card shadow p-4 mx-auto" style="max-width: 600px;">
            <div class="card-body">

                <form id="add-password-form" method="post" action="/save-password-edit" enctype="multipart/form-data">

                    {{#error}}
                    <div class="alert alert-danger">{{error}}</div>
                    {{/error}}

                    <div class="mb-3">
                        <label for="service" class="form-label text-white" >
                            <i class="bi bi-globe me-2 text-success"></i>Servicio
                        </label>
                        <input type="text" name="service" class="form-control bg-dark text-white border-secondary" id="service"
                            placeholder="ej: Netflix, Gmail" value="{{#credential}}{{siteName}}{{/credential}}" required>
                    </div>

                    <div class="mb-3">
                        <label for="username" class="form-label text-white">
                            <i class="bi bi-person me-2 text-success"></i>Usuario / Email
                        </label>
                        <input type="text" name="username" class="form-control bg-dark text-white border-secondary" id="username"
                            placeholder="usuario@ejemplo.com" value="{{#credential}}{{username}}{{/credential}}" required>
                    </div>

                    <div class="mb-3">
                        <label for="password" class="form-label text-white">
                            <i class="bi bi-key me-2 text-success"></i>Contraseña
                        </label>

                        <div class="input-group">
                            <input type="password" name="password" class="form-control bg-dark text-white border-secondary"
                                id="password" value="{{decryptedPassword}}" required>

                            <button class="btn btn-outline-secondary" type="button" onclick="togglePassword()">
                                <i class="bi bi-eye"></i>
                            </button>

                            <button class="btn btn-outline-success" type="button" onclick="generatePassword()">
                                <i class="bi bi-magic me-1"></i> Generar
                            </button>
                        </div>
                    </div>

                    <!-- Comprobar si es robusta -->
                    <div class="mb-3">
                        <div class="progress" style="height: 6px;">
                            <div id="strengthBar" class="progress-bar"></div>
                        </div>
                        <small id="strengthText" class="text-secondary"></small>
                    </div>

                    <div class="mb-3">
                        <label for="credentialImage" class="form-label text-white">
                            <i class="bi bi-image me-2 text-success"></i>Imagen de la credencial (opcional)
                        </label>
                        <div class="d-flex align-items-center gap-3 mb-2">
                            <img src="{{#credentialImageUrl}}{{credentialImageUrl}}{{/credentialImageUrl}}{{^credentialImageUrl}}https://ui-avatars.com/api/?name={{#credential}}{{siteName}}{{/credential}}&background=0f172a&color=fff{{/credentialImageUrl}}"
                                alt="Imagen credencial" style="width:48px;height:48px;object-fit:cover;border-radius:10px;border:1px solid rgba(255,255,255,0.2);">
                            <small class="text-secondary">Sube una nueva imagen si quieres reemplazar la actual.</small>
                        </div>
                        <input name="credentialImage" type="file" class="form-control bg-dark text-white border-secondary" id="credentialImage" accept="image/*">
                    </div>

                    <input type="hidden" name="id" value="{{#credential}}{{id}}{{/credential}}" />
                    <div class="d-flex gap-2">
                        <a href="/passwords" class="btn btn-outline-light w-50">Cancelar</a>
                        <button type="submit" class="btn btn-primary w-50">
                            <i class="bi bi-save me-2"></i>Guardar
                        </button>
                    </div>

                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/zxcvbn@4.4.2/dist/zxcvbn.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        const passwordInput = document.getElementById('password');
        const strengthBar = document.getElementById('strengthBar');
        const strengthText = document.getElementById('strengthText');
        const submitBtn = document.querySelector('button[type="submit"]');

        const levels = [
            { text: "Muy débil", class: "bg-danger", width: "20%" },
            { text: "Débil", class: "bg-warning", width: "40%" },
            { text: "Aceptable", class: "bg-info", width: "60%" },
            { text: "Fuerte", class: "bg-primary", width: "80%" },
            { text: "Muy fuerte", class: "bg-success", width: "100%" }
        ];

        function updateStrength() {
            const value = passwordInput.value;
            if (!value) {
                strengthBar.style.width = "0%";
                strengthBar.className = "progress-bar";
                strengthText.textContent = "";
                submitBtn.disabled = true;
                return;
            }

            const result = zxcvbn(value);
            const level = levels[result.score];

            strengthBar.style.width = level.width;
            strengthBar.className = `progress-bar ${level.class}`;
            strengthText.textContent = `Nivel: ${level.text}`;

            submitBtn.disabled = result.score < 3;
        }

        passwordInput.addEventListener('input', updateStrength);

        function togglePassword() {
            const input = document.getElementById('password');
            const icon = event.currentTarget.querySelector('i');

            if (input.type === "password") {
                input.type = "text";
                icon.classList.replace('bi-eye', 'bi-eye-slash');
            } else {
                input.type = "password";
                icon.classList.replace('bi-eye-slash', 'bi-eye');
            }
        }

        function generatePassword() {
            const length = 16;
            const lower = "abcdefghijklmnopqrstuvwxyz";
            const upper = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
            const numbers = "0123456789";
            const symbols = "!@#$%^&*()-_=+[]{};:,.?";
            const all = lower + upper + numbers + symbols;

            // Ensure at least one character from each set.
            const chars = [
                lower[Math.floor(Math.random() * lower.length)],
                upper[Math.floor(Math.random() * upper.length)],
                numbers[Math.floor(Math.random() * numbers.length)],
                symbols[Math.floor(Math.random() * symbols.length)]
            ];

            for (let i = chars.length; i < length; i++) {
                chars.push(all[Math.floor(Math.random() * all.length)]);
            }

            // Fisher-Yates shuffle for better distribution.
            for (let i = chars.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [chars[i], chars[j]] = [chars[j], chars[i]];
            }

            passwordInput.value = chars.join('');
            updateStrength();
        }

        updateStrength();
    </script>
    <script>
    </script>
    {{> fragments/footerPrivate}}

</body>

</html>
